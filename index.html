<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Precalculus Portal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        
        /* Navbar */
        .navbar { background-color: var(--primary); padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .navbar h1 { margin: 0; font-size: 24px; }
        #logout-btn { background: transparent; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; display: none; transition: 0.3s; }
        #logout-btn:hover { background: white; color: var(--primary); }

        /* Container */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* Login Box */
        #login-section { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn-main { background-color: var(--accent); color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { background-color: #2980b9; }

        /* Dashboard & Grid */
        #quiz-section { display: none; }
        .unit-header { border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-top: 40px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* Beautiful Cards */
        .quiz-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; transition: transform 0.2s, box-shadow 0.2s; border-top: 5px solid var(--accent); }
        .quiz-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .quiz-card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 22px; }
        .quiz-card p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .quiz-card a { display: inline-block; background-color: var(--accent); color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .quiz-card a:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>AP Precalculus Hub</h1>
        <button id="logout-btn">Log Out</button>
    </div>

    <div class="container">
        <div id="login-section">
            <h2 style="margin-top:0;">Student Login</h2>
            <p style="color:#666; font-size:14px;">Enter your credentials to access your assignments.</p>
            <input type="email" id="student-email" placeholder="Student Email">
            <input type="password" id="student-password" placeholder="Password">
            
            <button id="login-btn" class="btn-main">Log In</button>
            <button id="signup-btn" class="btn-main" style="background-color: #27ae60;">First Time? Sign Up</button>
            
            <p id="login-message" style="color: red; font-weight:bold; margin-top:15px;"></p>
        </div>

        <div id="quiz-section">
            <h2>Welcome back! Here are your active assignments:</h2>
            <div id="dashboard-content">
                </div>
        </div>
    </div>

    <script type="module" src="student.js"></script>
</body>
</html>
