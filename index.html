<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Precalc Quizzes</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; text-align: center; }
        .quiz-section { display: none; margin-top: 30px; } /* Hidden by default */
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>AP Precalculus Portal</h1>
    
    <div id="login-section">
        <p>Enter your email and a password to access your quizzes.</p>
        <input type="email" id="student-email" placeholder="student@example.com" style="display:block; margin: 10px auto; padding: 8px;">
        <input type="password" id="student-password" placeholder="Create or enter password" style="display:block; margin: 10px auto; padding: 8px;">
        
        <button id="login-btn">Log In</button>
        <button id="signup-btn" style="background-color: #28a745; color: white;">First Time? Sign Up</button>
        
        <p id="login-message" style="color: red;"></p>
    </div>

    <div id="quiz-section" class="quiz-section">
        <h2>Your Available Quizzes</h2>
        <div id="quiz-container">
            </div>
        <br>
        <button id="logout-btn">Log Out</button>
    </div>

    <script type="module" src="student.js"></script>
</body>
</html>
