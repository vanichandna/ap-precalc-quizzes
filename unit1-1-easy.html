<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 1.1 - Easy Practice</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
  .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h1 { text-align: center; color: #27ae60; font-size: 28px;}
  p.subtitle { text-align:center; margin-bottom: 30px; color: #555; }
  .question-block { margin-bottom: 25px; padding: 20px; border-left: 5px solid #27ae60; background-color: #fdfdfd; border-radius: 0 8px 8px 0; }
  .question-text { font-weight: bold; font-size: 16px; margin-bottom: 15px; line-height: 1.5;}
  .options label { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border-radius: 4px; transition: background 0.2s; border: 1px solid transparent;}
  .options label:hover { background-color: #eafaf1; border: 1px solid #dcdcdc; }
  .btn-submit { display: block; width: 100%; padding: 15px; font-size: 18px; color: white; background-color: #27ae60; border: none; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; transition: 0.3s;}
  .btn-submit:hover { background-color: #219653; }
  .btn-submit:disabled { background-color: #95a5a6; cursor: not-allowed; }
  #score-display { margin-top: 25px; font-weight: bold; font-size: 20px; text-align: center; padding: 15px; border-radius: 5px; display: none; }
  .solution-box { margin-top: 15px; padding: 15px; background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; border-radius: 5px; display: none; font-size: 15px; line-height: 1.5;}
  .correct-highlight { background-color: #d4edda !important; border: 1px solid #c3e6cb !important; font-weight: bold; }
  .incorrect-highlight { background-color: #f8d7da !important; border: 1px solid #f5c6cb !important; color: #721c24; text-decoration: line-through;}
  .home-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #27ae60; font-weight: bold; }
  table { border-collapse: collapse; margin: 10px 0; min-width: 300px; text-align: center; }
  th, td { border: 1px solid #ccc; padding: 8px; }
  th { background-color: #f2f2f2; }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="home-link">&larr; Back to Dashboard</a>
  
  <h1>Unit 1.1: Easy Practice</h1>
  <p class="subtitle">Focus: Calculating and identifying Average Rates of Change.</p>
  
  <div id="quiz-container">Loading practice questions...</div>

  <button type="button" id="submit-btn" class="btn-submit" style="display: none;">Submit & Check Answers</button>
  <div id="score-display"></div>
</div>

<script type="module">
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { auth, db } from './firebase-config.js';

let currentUser = null;
const container = document.getElementById('quiz-container');
const submitBtn = document.getElementById('submit-btn');

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const docSnap = await getDoc(doc(db, "users", user.email));
        if (docSnap.exists() && docSnap.data().access.unit1_1 === true) {
            currentUser = user;
            container.innerHTML = ""; 
            submitBtn.style.display = "block"; 
            renderQuiz(); 
        } else {
            container.innerHTML = "<h3 style='color:red;'>Access Denied.</h3>";
        }
    } else {
        window.location.href = "index.html"; 
    }
});

const quizData = [
  {
    q: "1. A function f(x) passes through the points (1, 5) and (4, 17). What is the average rate of change of f(x) on the interval [1, 4]?",
    opts: { A: "12", B: "4", C: "3", D: "6" },
    ans: "B",
    sol: "Use the formula (y2 - y1) / (x2 - x1). Plugging in the points: (17 - 5) / (4 - 1) = 12 / 3 = 4."
  },
  {
    q: `2. Consider the table of values for a continuous function g(x):
        <table style="margin-top:10px;"><tr><th>x</th><td>0</td><td>2</td><td>4</td><td>6</td></tr><tr><th>g(x)</th><td>10</td><td>7</td><td>4</td><td>1</td></tr></table>
        Which of the following describes how g(x) changes in tandem with x?`,
    opts: { 
        A: "As x increases, g(x) increases at a constant rate.", 
        B: "As x increases, g(x) decreases at a decreasing rate.", 
        C: "As x increases, g(x) decreases at a constant rate.", 
        D: "As x increases, g(x) decreases at an increasing rate." 
    },
    ans: "C",
    sol: "Calculate the average rate of change for each interval. From x=0 to 2, ROC is (7-10)/2 = -1.5. From x=2 to 4, ROC is (4-7)/2 = -1.5. Because the rate of change is constant and negative, g(x) decreases at a constant rate."
  },
  {
    q: "3. If the average rate of change of a function h(x) over the interval [2, 5] is negative, which of the following MUST be true?",
    opts: { 
        A: "h(5) is less than h(2)", 
        B: "h(5) is greater than h(2)", 
        C: "The function is decreasing at every single point between x=2 and x=5", 
        D: "The graph of h(x) is concave down" 
    },
    ans: "A",
    sol: "Average rate of change only looks at the endpoints. If the overall rate of change is negative, the y-value at the end of the interval, h(5), must be strictly lower than the y-value at the start of the interval, h(2)."
  },
  {
    q: "4. Let p(x) = x&sup2; + 2x. What is the average rate of change of p(x) over the interval [-1, 3]?",
    opts: { A: "4", B: "8", C: "16", D: "2" },
    ans: "A",
    sol: "Evaluate the endpoints: p(3) = (3)&sup2; + 2(3) = 9 + 6 = 15. Then p(-1) = (-1)&sup2; + 2(-1) = 1 - 2 = -1. The rate is (15 - (-1)) / (3 - (-1)) = 16 / 4 = 4."
  },
  {
    q: "5. A function m(x) has a constant rate of change of 0 over the interval [-5, 5]. Which of the following best describes the graph of m(x) on this interval?",
    opts: { A: "A vertical line", B: "A perfectly flat horizontal line", C: "A line passing through the origin", D: "A parabola opening upwards" },
    ans: "B",
    sol: "A constant rate of change of 0 means the y-values never increase or decrease as x changes. Graphically, this is a horizontal line."
  }
];
function renderQuiz() {
    quizData.forEach((item, index) => {
      let optionsHtml = '';
      for (const [key, value] of Object.entries(item.opts)) {
        optionsHtml += `<label id="label-${index}-${key}"><input type="radio" name="q${index}" value="${key}"> <strong>${key})</strong> ${value}</label>`;
      }
      container.innerHTML += `
        <div class="question-block" id="block-${index}">
          <div class="question-text">${item.q}</div>
          <div class="options">${optionsHtml}</div>
          <div class="solution-box" id="solution-${index}">
            <strong>Detailed Solution:</strong> <br>${item.sol}
          </div>
        </div>
      `;
    });
}

submitBtn.addEventListener('click', async () => {
    let allAnswered = true;
    quizData.forEach((item, index) => { if (!document.querySelector(`input[name="q${index}"]:checked`)) allAnswered = false; });
    if (!allAnswered) return alert("Please answer all questions before submitting.");
    
    let score = 0;
    quizData.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`).value;
        document.querySelectorAll(`input[name="q${index}"]`).forEach(input => input.disabled = true);
        
        if (selected === item.ans) {
            score++;
            document.getElementById(`label-${index}-${selected}`).classList.add('correct-highlight');
        } else {
            document.getElementById(`label-${index}-${selected}`).classList.add('incorrect-highlight');
            document.getElementById(`label-${index}-${item.ans}`).classList.add('correct-highlight');
        }
        document.getElementById(`solution-${index}`).style.display = "block"; 
    });

    const percentage = Math.round((score / quizData.length) * 100);
    const scoreDiv = document.getElementById('score-display');
    scoreDiv.style.display = "block";
    submitBtn.disabled = true;

    if (percentage === 100) {
        scoreDiv.style.backgroundColor = "#d4edda";
        scoreDiv.style.color = "#155724";
        scoreDiv.innerHTML = `Perfect! You scored 100%.`;
    } else {
        scoreDiv.style.backgroundColor = "#fff3cd";
        scoreDiv.style.color = "#856404";
        scoreDiv.innerHTML = `You scored ${percentage}%. Review the solutions above.`;
    }

    try {
        const studentRef = doc(db, "users", currentUser.email);
        await updateDoc(studentRef, {
            "scores.unit1_1_easy": percentage 
        });
        submitBtn.innerText = "Score Saved!";
    } catch (error) {
        submitBtn.innerText = "Error Saving Score";
    }
});
</script>

</body>
</html>
