<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 1.1 - Hard Practice</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
  .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h1 { text-align: center; color: #e74c3c; font-size: 28px;}
  p.subtitle { text-align:center; margin-bottom: 30px; color: #555; }
  .question-block { margin-bottom: 25px; padding: 20px; border-left: 5px solid #e74c3c; background-color: #fdfdfd; border-radius: 0 8px 8px 0; }
  .question-text { font-weight: bold; font-size: 16px; margin-bottom: 15px; line-height: 1.5;}
  .options label { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border-radius: 4px; transition: background 0.2s; border: 1px solid transparent;}
  .options label:hover { background-color: #fadbd8; border: 1px solid #dcdcdc; }
  .btn-submit { display: block; width: 100%; padding: 15px; font-size: 18px; color: white; background-color: #e74c3c; border: none; border-radius: 5px; cursor: pointer; margin-top: 30px; font-weight: bold; transition: 0.3s;}
  .btn-submit:hover { background-color: #c0392b; }
  .btn-submit:disabled { background-color: #95a5a6; cursor: not-allowed; }
  #score-display { margin-top: 25px; font-weight: bold; font-size: 20px; text-align: center; padding: 15px; border-radius: 5px; display: none; }
  .solution-box { margin-top: 15px; padding: 15px; background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; border-radius: 5px; display: none; font-size: 15px; line-height: 1.5;}
  .correct-highlight { background-color: #d4edda !important; border: 1px solid #c3e6cb !important; font-weight: bold; }
  .incorrect-highlight { background-color: #f8d7da !important; border: 1px solid #f5c6cb !important; color: #721c24; text-decoration: line-through;}
  .home-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #e74c3c; font-weight: bold; }
  table { border-collapse: collapse; margin: 10px 0; min-width: 300px; text-align: center; }
  th, td { border: 1px solid #ccc; padding: 8px; }
  th { background-color: #f2f2f2; }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="home-link">&larr; Back to Dashboard</a>
  
  <h1>Unit 1.1: Hard Practice</h1>
  <p class="subtitle">Focus: Contextual models and proportional reasoning.</p>
  
  <div id="quiz-container">Loading practice questions...</div>

  <button type="button" id="submit-btn" class="btn-submit" style="display: none;">Submit & Check Answers</button>
  <div id="score-display"></div>
</div>

<script type="module">
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { auth, db } from './firebase-config.js';

let currentUser = null;
const container = document.getElementById('quiz-container');
const submitBtn = document.getElementById('submit-btn');

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const docSnap = await getDoc(doc(db, "users", user.email));
        if (docSnap.exists() && docSnap.data().access.unit1_1 === true) {
            currentUser = user;
            container.innerHTML = ""; 
            submitBtn.style.display = "block"; 
            renderQuiz(); 
        } else {
            container.innerHTML = "<h3 style='color:red;'>Access Denied.</h3>";
        }
    } else {
        window.location.href = "index.html"; 
    }
});

const quizData = [
  {
    q: "1. A spherical balloon is being inflated such that its volume V increases at a constant rate with respect to time t. How does the radius r of the balloon change in tandem with time t?",
    opts: { 
        A: "The radius increases at a constant rate.", 
        B: "The radius increases at an increasing rate.", 
        C: "The radius increases at a decreasing rate.", 
        D: "The radius decreases at a decreasing rate." 
    },
    ans: "C",
    sol: "As the balloon gets larger, it requires significantly more volume to add just a tiny bit of length to the radius. Because the volume is entering at a constant speed, the outward growth of the radius must slow down as the balloon expands. Therefore, the radius increases at a decreasing rate (concave down)."
  },
  {
    q: "2. The variables x and y change in tandem such that for every increase of 2 in the value of x, the value of y is multiplied by 3. If y = 4 when x = 0, what is the value of y when x = 6?",
    opts: { A: "36", B: "108", C: "256", D: "324" },
    ans: "B",
    sol: "The x-values increase from 0 to 6 in steps of 2: 0 &rarr; 2 &rarr; 4 &rarr; 6. This is exactly three steps. Since y is multiplied by 3 for each step, we multiply the initial y-value by 3, three times. y = 4 * (3 * 3 * 3) = 4 * 27 = 108."
  },
  {
    q: "3. Water is poured into a conical cup (point facing down) at a constant rate. Let h(t) represent the height of the water in the cup at time t. Which of the following best describes the concavity of h(t)?",
    opts: { A: "Concave up", B: "Concave down", C: "Linear", D: "Cannot be determined" },
    ans: "B",
    sol: "Because the cone is wider at the top than at the bottom, it takes more water to raise the level by 1 inch at the top than it does at the narrow bottom. Since water enters at a constant rate, the height will rise quickly at first, and then slow down as the cup gets wider. An increasing function that is slowing down is concave down."
  },
  {
    q: "4. A car traveling at 60 mph suddenly slams on the brakes. Let d(t) be the total distance the car has traveled since the brakes were applied. Which of the following describes the rate of change of d(t)?",
    opts: { 
        A: "d(t) increases at an increasing rate", 
        B: "d(t) increases at a decreasing rate", 
        C: "d(t) decreases at an increasing rate", 
        D: "d(t) decreases at a decreasing rate" 
    },
    ans: "B",
    sol: "The car is still moving forward, so the total distance traveled, d(t), is increasing. However, because the brakes are applied, the car is slowing down. Therefore, the distance is increasing, but it is increasing at a decreasing rate as the car comes to a stop."
  },
  {
    q: "5. Company A and Company B both produce 500 units of a product per day. Company A decides to increase production by adding exactly 50 units per day. Company B decides to increase production by 10% per day. How do the rates of change compare over the first 5 days?",
    opts: { 
        A: "Both companies increase at a constant rate.", 
        B: "Company A increases at a constant rate, while Company B increases at an increasing rate.", 
        C: "Company A increases at an increasing rate, while Company B increases at a constant rate.", 
        D: "Both companies increase at an increasing rate." 
    },
    ans: "B",
    sol: "Company A adds a fixed amount (+50) every day, which defines a constant rate of change (linear). Company B multiplies its current total by 1.10 every day. As the total gets larger, 10% of that total also becomes a larger number, meaning Company B's growth rate accelerates over time (increasing at an increasing rate)."
  }
];

function renderQuiz() {
    quizData.forEach((item, index) => {
      let optionsHtml = '';
      for (const [key, value] of Object.entries(item.opts)) {
        optionsHtml += `<label id="label-${index}-${key}"><input type="radio" name="q${index}" value="${key}"> <strong>${key})</strong> ${value}</label>`;
      }
      container.innerHTML += `
        <div class="question-block" id="block-${index}">
          <div class="question-text">${item.q}</div>
          <div class="options">${optionsHtml}</div>
          <div class="solution-box" id="solution-${index}">
            <strong>Detailed Solution:</strong> <br>${item.sol}
          </div>
        </div>
      `;
    });
}

submitBtn.addEventListener('click', async () => {
    let allAnswered = true;
    quizData.forEach((item, index) => { if (!document.querySelector(`input[name="q${index}"]:checked`)) allAnswered = false; });
    if (!allAnswered) return alert("Please answer all questions before submitting.");
    
    let score = 0;
    quizData.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`).value;
        document.querySelectorAll(`input[name="q${index}"]`).forEach(input => input.disabled = true);
        
        if (selected === item.ans) {
            score++;
            document.getElementById(`label-${index}-${selected}`).classList.add('correct-highlight');
        } else {
            document.getElementById(`label-${index}-${selected}`).classList.add('incorrect-highlight');
            document.getElementById(`label-${index}-${item.ans}`).classList.add('correct-highlight');
        }
        document.getElementById(`solution-${index}`).style.display = "block"; 
    });

    const percentage = Math.round((score / quizData.length) * 100);
    const scoreDiv = document.getElementById('score-display');
    scoreDiv.style.display = "block";
    submitBtn.disabled = true;

    if (percentage === 100) {
        scoreDiv.style.backgroundColor = "#d4edda";
        scoreDiv.style.color = "#155724";
        scoreDiv.innerHTML = `Perfect! You scored 100%.`;
    } else {
        scoreDiv.style.backgroundColor = "#fff3cd";
        scoreDiv.style.color = "#856404";
        scoreDiv.innerHTML = `You scored ${percentage}%. Review the solutions above.`;
    }

    try {
        const studentRef = doc(db, "users", currentUser.email);
        await updateDoc(studentRef, {
            "scores.unit1_1_hard": percentage // SAVES TO HARD SLOT
        });
        submitBtn.innerText = "Score Saved!";
    } catch (error) {
        submitBtn.innerText = "Error Saving Score";
    }
});
</script>

</body>
</html>
